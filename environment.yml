name: hera
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pymatgen
  - matminer
  - ase
  - pip:
      # CUDA/PyTorch stack from the known-working requirements.txt.
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - --find-links https://data.pyg.org/whl/torch-2.5.0+cu124.html
      - torch==2.5.1+cu124
      - torch-geometric==2.6.1
      - pyg-lib==0.4.0+pt25cu124
      - torch-scatter==2.1.2+pt25cu124
      - torch-sparse==0.6.18+pt25cu124
      - torch-cluster==1.6.3
      - torch-spline-conv==1.2.2+pt25cu124

      # Core HERA runtime.
      - numpy==1.26.0
      - pandas==2.3.0
      - scipy==1.14.1
      - scikit-learn==1.6.0
      - joblib==1.4.2
      - tqdm

      # Explanation/visualization and notebook support.
      - matplotlib==3.9.2
      - jupyterlab==4.4.6
      - notebook==7.4.5
      - ipykernel==6.29.5
      - ipywidgets==8.1.5
      - nglview==3.1.4
