name: hera
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - libstdcxx-ng>=15
  - libgcc-ng>=15
  - spglib
  - pymatgen
  - matminer
  - ase
  - pip:
      # CUDA/PyTorch/PyG stack for heterogeneous GNNExplainer support.
      - --prefer-binary
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - --find-links https://data.pyg.org/whl/torch-2.11.0+cu128.html
      - torch==2.11.0+cu128
      - torch-geometric==2.7.0
      - pyg-lib
      - torch-scatter
      - torch-sparse

      # Core HERA runtime.
      - numpy==1.26.0
      - pandas==2.3.0
      - scipy==1.14.1
      - scikit-learn==1.6.0
      - joblib==1.4.2
      - tqdm

      # Explanation/visualization and notebook support.
      - matplotlib==3.9.2
      - jupyterlab==4.4.6
      - notebook==7.4.5
      - ipykernel==6.29.5
      - ipywidgets==8.1.5
      - nglview==3.1.4
